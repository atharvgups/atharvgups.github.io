<section class="section other-projects">
  <div class="section__title"><span class="section__num">4</span>Projects</div>
  <div class="section__content">
    {% for project in site.data.other-projects %}
    <div class="project">
      <div class="project__name">
        {% if project.url and project.url != '' %}
        <a href="{{project.url}}" target="_blank" class="arrow-link">{{project.name}}</a>
        {% else %}
        {{project.name}}
        {% endif %}
      </div>
      <p>{{project.description}}</p>
      <div class="project__used">
        {% for item in project.used %}
        <span class="project__used__item">{{item.thing}}</span>
        {% endfor %}
      </div>
    </div>
    {% endfor %}
    <a href="https://github.com/atharvgups" target="_blank" class="arrow-link projects__more">More on GitHub</a>
  </div>
</section>
