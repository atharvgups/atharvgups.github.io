<footer class="footer">
  <ul class="footer__socials">
    {% for s in site.social %}
    <li><a href="{{ s.url }}" target="_blank" rel="noopener">{{ s.title }}</a></li>
    {% endfor %}
  </ul>
  <p class="footer__credit">
    Designed &amp; built by {{ site.name }}
    <span class="footer__year">&middot; {{ 'now' | date: "%Y" }}</span>
  </p>
</footer>
<button id="top-button" aria-label="Back to top">&uarr;</button>
