<section class="section skills reveal" id="skills">
  <div class="section__head">
    <span class="section__num">04.</span>
    <h2 class="section__title">Skills &amp; toolkit</h2>
    <span class="section__rule"></span>
  </div>

  <div class="skills__grid">
    {% for group in site.data.skills.groups %}
    <div class="skill-group">
      <h3 class="skill-group__label">{{ group.label }}</h3>
      <ul class="skill-group__items">
        {% for item in group.items %}
        <li>{{ item }}</li>
        {% endfor %}
      </ul>
    </div>
    {% endfor %}
  </div>
</section>
