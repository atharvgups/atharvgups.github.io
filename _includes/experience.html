<section class="section experience reveal" id="experience">
  <div class="section__head">
    <span class="section__num">02.</span>
    <h2 class="section__title">Experience &amp; leadership</h2>
    <span class="section__rule"></span>
  </div>

  <div class="timeline">
    {% for job in site.data.experience %}
    <article class="tl-item">
      <div class="tl-item__marker" aria-hidden="true"></div>
      <div class="tl-item__body">
        <div class="tl-item__top">
          <h3 class="tl-item__role">{{ job.role }} <span class="tl-item__at">· {{ job.org }}</span></h3>
          <span class="tl-item__time">{{ job.time }}</span>
        </div>
        <ul class="tl-item__points">
          {% for point in job.points %}
          <li>{{ point }}</li>
          {% endfor %}
        </ul>
      </div>
    </article>
    {% endfor %}
  </div>
</section>
